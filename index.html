<style>
:root{--ink:#1a1208;--deep:#2b1f0e;--gold:#b8935a;--gold-light:#d4aa72;--gold-pale:#f5e9d3;--smoke:#f7f3ec;--stone:#8a7560;--cream:#faf6ef;--border:rgba(184,147,90,0.25);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--cream);color:var(--ink);}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 64px;height:80px;background:rgba(250,246,239,0.97);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Ma Shan Zheng',cursive;font-size:2.2rem;color:var(--deep);text-decoration:none;letter-spacing:0.12em;}
.nav-logo span{color:var(--gold);}
.nav-links{display:flex;gap:36px;list-style:none;}
.nav-links a{font-size:1rem;color:var(--stone);text-decoration:none;letter-spacing:0.08em;transition:color 0.2s;}
.nav-links a:hover{color:var(--gold);}
.nav-cta{background:var(--gold);color:#fff;padding:11px 26px;border-radius:2px;font-size:0.9rem;text-decoration:none;letter-spacing:0.1em;}
.nav-cta:hover{background:var(--deep);}
.hamburger-btn{display:none;background:none;border:none;cursor:pointer;padding:4px;}
.hamburger-btn svg{width:26px;height:26px;stroke:var(--deep);fill:none;stroke-width:2;stroke-linecap:round;}

/* MOBILE MENU - checkbox trick */
#menu-toggle{display:none;}
.mobile-menu{
  display:none;position:fixed;top:80px;left:0;right:0;
  background:var(--smoke);border-bottom:1px solid var(--border);
  z-index:999;
}
#menu-toggle:checked ~ .mobile-menu{display:block;}
.mobile-menu a{
  display:block;padding:16px 24px;font-size:1rem;
  color:var(--stone);text-decoration:none;
  border-bottom:1px solid var(--border);
}
.mobile-menu a:last-child{border-bottom:none;}
.mobile-menu a:hover{color:var(--gold);background:rgba(184,147,90,0.05);}
label.hamburger-btn{cursor:pointer;}

/* PAGES */
.page{display:none;min-height:100vh;padding-top:80px;}
.page:target{display:block;}
#home{display:block;}
.page:target ~ #home{display:none;}
#menu-target:target ~ #home{display:block;}

/* HERO */
.hero{min-height:calc(100vh - 80px);display:grid;grid-template-columns:1fr 1fr;}
.hero-left{background:var(--deep);display:flex;flex-direction:column;justify-content:center;padding:96px 72px 80px 96px;position:relative;overflow:hidden;}
.hero-left::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 60%,rgba(184,147,90,0.13) 0%,transparent 65%);pointer-events:none;}
.hero-tag{font-size:1.1rem;letter-spacing:0.25em;color:var(--gold);margin-bottom:28px;display:flex;align-items:center;gap:14px;}
.hero-tag::before{content:'';width:36px;height:1px;background:var(--gold);}
.hero-title{font-family:'Noto Serif TC',serif;font-size:clamp(2.5rem,3.8vw,4.2rem);font-weight:300;color:var(--gold-pale);line-height:1.4;letter-spacing:0.04em;margin-bottom:10px;}
.hero-title strong{font-weight:700;color:var(--gold-light);display:block;font-size:clamp(2.2rem,3.4vw,3.8rem);margin-top:4px;}
.hero-subtitle{font-family:'Noto Serif TC',serif;font-size:1.3rem;color:rgba(213,190,150,0.7);letter-spacing:0.18em;margin-bottom:36px;}
.hero-poem{font-size:1.15rem;line-height:2.4;color:rgba(213,190,150,0.58);border-left:2px solid var(--gold);padding-left:22px;margin-bottom:52px;letter-spacing:0.06em;}
.hero-buttons{display:flex;gap:18px;flex-wrap:wrap;}
.hero-right{background:var(--deep);overflow:hidden;position:relative;}
.hero-right img{width:100%;height:100%;object-fit:cover;object-position:60% center;filter:brightness(0.92) saturate(1.05);}
.hero-right::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,var(--deep) 0%,rgba(43,31,14,0.5) 8%,transparent 30%);pointer-events:none;z-index:1;}
.hero-deco{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.hero-deco svg{width:100%;height:100%;}
.btn-primary{background:var(--gold);color:#fff;padding:15px 36px;border-radius:2px;text-decoration:none;font-size:0.95rem;display:inline-block;letter-spacing:0.1em;transition:all 0.3s;}
.btn-primary:hover{background:var(--gold-light);transform:translateY(-2px);}
.btn-ghost{border:1px solid rgba(184,147,90,0.5);color:var(--gold-light);padding:15px 36px;border-radius:2px;text-decoration:none;font-size:0.95rem;display:inline-block;letter-spacing:0.1em;transition:all 0.3s;}
.btn-ghost:hover{border-color:var(--gold);background:rgba(184,147,90,0.08);}

/* INFO BAR */

.info-icon-wrap{width:40px;height:40px;border:1px solid rgba(184,147,90,0.35);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.info-icon-wrap svg{width:17px;height:17px;stroke:var(--gold);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.info-label{font-size:0.95rem;letter-spacing:0.14em;color:rgba(184,147,90,0.65);margin-bottom:5px;text-transform:uppercase;}
.info-value{font-size:1.05rem;color:var(--gold-pale);line-height:1.6;}
.info-value a{color:var(--gold-pale);text-decoration:none;}

/* SECTIONS */

.section-label{font-size:1rem;letter-spacing:0.28em;color:var(--gold);display:block;margin-bottom:18px;text-transform:uppercase;}
.section-title{font-family:'Noto Serif TC',serif;font-size:3rem;font-weight:400;color:var(--deep);letter-spacing:0.06em;line-height:1.4;}
.section-divider{width:52px;height:1px;background:var(--gold);margin:22px auto 0;}
.services{padding:108px 96px;background:var(--smoke);}

.service-card{background:var(--cream);padding:52px 40px;position:relative;overflow:hidden;transition:transform 0.4s;}

.service-icon-box{width:54px;height:54px;border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:26px;background:var(--gold-pale);}

.wisdom-author{margin-top:20px;font-size:1rem;letter-spacing:0.12em;color:var(--gold);}

.page-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 50%,rgba(184,147,90,0.1) 0%,transparent 60%);}
.page-banner-tag{font-size:0.9rem;letter-spacing:0.22em;color:var(--gold);margin-bottom:18px;display:flex;align-items:center;gap:12px;position:relative;}
.page-banner-tag::before{content:'';width:30px;height:1px;background:var(--gold);}
.page-banner h1{font-family:'Noto Serif TC',serif;font-size:3.6rem;font-weight:300;color:var(--gold-pale);letter-spacing:0.06em;line-height:1.4;position:relative;}
.page-banner p{margin-top:18px;font-size:1.1rem;color:rgba(213,190,150,0.62);line-height:2.1;max-width:560px;position:relative;}
.content-page{padding:96px;max-width:960px;margin:0 auto;}
.content-page h2{font-family:'Noto Serif TC',serif;font-size:2.4rem;color:var(--deep);margin-bottom:28px;font-weight:400;letter-spacing:0.04em;}
.content-page p{font-size:1.05rem;line-height:2.4;color:var(--stone);margin-bottom:20px;}
.booking-grid{padding:96px;display:grid;grid-template-columns:1fr 1fr;gap:80px;max-width:1200px;margin:0 auto;align-items:start;}
.booking-grid h2{font-family:'Noto Serif TC',serif;font-size:2rem;color:var(--deep);margin-bottom:24px;font-weight:400;}
.booking-grid>div>p{font-size:0.94rem;line-height:2.2;color:var(--stone);margin-bottom:28px;}

.booking-form{display:grid;gap:14px;}
.booking-form input,.booking-form textarea,.booking-form select{width:100%;background:var(--smoke);border:1px solid var(--border);padding:14px 18px;font-family:'Noto Sans TC',sans-serif;font-size:0.92rem;color:var(--ink);outline:none;border-radius:0;transition:border-color 0.2s;}
.booking-form input:focus,.booking-form textarea:focus,.booking-form select:focus{border-color:var(--gold);}
.booking-form textarea{height:120px;resize:vertical;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.submit-btn{background:var(--deep);color:var(--gold-light);border:none;padding:16px;font-family:'Noto Sans TC',sans-serif;font-size:0.92rem;letter-spacing:0.14em;cursor:pointer;width:100%;transition:background 0.2s;}

footer{background:var(--ink);padding:72px 96px 40px;}

.footer-col li{margin-bottom:10px;}

  .hero-subtitle{font-size:1.1rem;margin-bottom:20px;}

  .btn-primary,.btn-ghost{text-align:center;padding:16px 24px;font-size:1.05rem;}
  .info-bar{grid-template-columns:1fr 1fr;}
  .info-item{padding:20px 16px;}
  .info-label{font-size:0.95rem;}
  .info-value{font-size:1rem;}
  .services{padding:60px 20px;}
  .services-grid{grid-template-columns:1fr;}
  .service-title{font-size:1.5rem;}
  .service-desc{font-size:1rem;}
  .service-list li{font-size:0.98rem;}
  .home-about{grid-template-columns:1fr;padding:60px 20px;gap:0;}
  .about-image-wrap{display:none;}
  .about-quote{font-size:3rem;}
  .about-text{font-size:1rem;}
  .wisdom{padding:60px 20px;}
  .wisdom-grid{grid-template-columns:1fr;}
  .wisdom-text{font-size:1.1rem;}
  .wisdom-author{font-size:0.95rem;}
  .page-banner{padding:52px 24px 44px;}
  .page-banner-tag{font-size:1rem;}
  .page-banner h1{font-size:2.4rem;}
  .page-banner p{font-size:1.05rem;}
  .content-page{padding:44px 20px;}
  .content-page h2{font-size:2rem;}
  .content-page p{font-size:1rem;}
  .booking-grid{grid-template-columns:1fr;padding:44px 20px;gap:40px;}
  .booking-grid h2{font-size:1.8rem;}
  .booking-grid>div>p{font-size:1rem;}
  .contact-label{font-size:0.85rem;}
  .contact-value{font-size:1rem;}
  .form-row{grid-template-columns:1fr;}
  .booking-form input,.booking-form textarea,.booking-form select{font-size:1rem;}
  .submit-btn{font-size:1rem;}
  footer{padding:52px 20px 32px;}
  .footer-brand{font-size:2rem;}
  .footer-tagline{font-size:0.95rem;}
  .footer-grid{grid-template-columns:1fr 1fr;gap:28px;}
  .footer-col-title{font-size:0.95rem;}
  .footer-col a{font-size:0.92rem;}
  .footer-bottom{flex-direction:column;gap:8px;font-size:0.88rem;}
}
</style>
